<!DOCTYPE html>
<html>
<head>
    <title>Utils</title>
    <link rel="stylesheet" href="assets/main.css">
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
</head>
<body>
    <div id="main">
        <img id="title-image" src="assets/title.gif" alt="MoEsports3 Title Gif">
        <span id="original" class="page-text">
            Open terminal to continue
            <span id="firefox-shortcut" class="browser-shortcut" style="display:none;">
                <kbd>ctrl</kbd> <kbd>shift</kbd> <kbd>k</kbd>
            </span>
            <span id="chrome-shortcut" class="browser-shortcut" style="display:none;">
                <kbd>ctrl</kbd> <kbd>shift</kbd> <kbd>j</kbd>
            </span>
        </span>
        <span class="page-text">
            <span id="devtool-open" class="browser-shortcut" style="display: none;">
                <p class="tool-list">
                    <span>Prism Launcher <kbd>prism()</kbd></span>
                    <span>OpenTTD <kbd>openttd()</kbd></span>
                    <span>Dolphin Emulator <kbd>dolphin()</kbd></span>
                    <span>Google Drive <kbd>drive()</kbd></span>
                    <span>Minecraft Server <kbd>mc()</kbd></span>
                    <span id="ip" style="display: none;">ip: station-oz.gl.joinmc.link</span>
                </p>
            </span>
        </span>
    </div>
    <script src="assets/main.js"></script>
</body>
</html>
